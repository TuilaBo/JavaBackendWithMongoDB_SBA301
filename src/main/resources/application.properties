spring.application.name=orchid

server.port=8080
spring.profiles.default=dev
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Disable Spring Cloud Config
spring.cloud.config.enabled=false

# Disable Spring Boot Actuator remote configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.packages-to-scan=com.se170395.orchid.controller,controller
springdoc.paths-to-match=/api/**,/auth/**
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none

# Allow circular references to fix the SecurityConfig dependency cycle
spring.main.allow-circular-references=true

# Logging configuration
logging.level.org.springframework.security=DEBUG
logging.level.com.se170395.orchid=DEBUG
logging.level.org.springdoc=DEBUG

# Email notification (tắt mặc định để tránh bắn nhầm khi chưa cấu hình SMTP)
orchid.mail.enabled=true
# orchid.mail.from=your-sender@example.com
orchid.mail.from=dangkhoavo10@gmail.com

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=dangkhoavo10@gmail.com
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Spring AI (Step 1) - Gemini (Google AI Studio key)
spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GEMINI_API_KEY:}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.embedding.project-id=orchid-ai-product
spring.ai.google.genai.embedding.location=us-central1
orchid.ai.rag.top-k=4
